<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; font-family: sans-serif; }
        #game-container { position: relative; }
        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 10;
        }
        .btn {
            background: #FFD700; border: none; padding: 15px 40px; margin: 10px;
            font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.2s;
        }
        .btn:hover { transform: scale(1.1); background: #fff; }
        #board { border: 2px solid #333; }
    </style>
</head>
<body>
    <div id="game-container">
    <div id="menu">
        <h1>PAC-MAN</h1>
        <p>CHOOSE YOUR DESTINY</p>
        <div class="btn-container">
            <button class="btn" onclick="startGame('easy')">EASY</button>
            <button class="btn" onclick="startGame('medium')">MEDIUM</button>
            <button class="btn" onclick="startGame('hard')">HARD</button>
        </div>
    </div>

    <div id="pause-menu" style="display: none;">
    <h2>PAUSED</h2>
    <div class="btn-container">
        <button class="btn" onclick="resumeGame()">Resume</button>
        <button class="btn" onclick="restartLevel()">Restart</button>
        <button class="btn" onclick="goToMenu()">Menu</button>
    </div>
</div>

    <div id="end-screen" style="display: none;">
    <h1 id="end-message">GAME OVER</h1>
    <p id="final-score"></p>
    <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
</div>

    <canvas id="board"></canvas>

    <div id="high-score-screen" style="display: none;">
    <h2>NEW HIGH SCORE!</h2>
    <input type="text" id="player-name" placeholder="ENTER NAME" maxlength="3">
    <button class="btn" onclick="saveScore()">SUBMIT</button>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
